<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        :root {
            --primary-red: #ff0000;
            --dark-bg: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--dark-bg);
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            color: white;
            overflow: hidden; /* Mantém o foco no conteúdo central */
        }

        /* Camada da Foto de Fundo */
        .background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('jp-direto.jpg'); /* Verifique o nome do seu arquivo */
            background-size: cover;
            background-position: center top;
            z-index: 1;
        }

        /* Gradiente de sobreposição idêntico ao original */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, 
                rgba(0,0,0,0.1) 0%, 
                rgba(0,0,0,0.4) 50%, 
                rgba(0,0,0,0.95) 90%);
            z-index: 2;
        }

        /* Container Principal */
        .main-content {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            height: 100vh;
            padding: 0 20px 40px 20px;
            text-align: center;
        }

        /* Headline em Bloco Vermelho */
        .headline-wrapper {
            background-color: var(--primary-red);
            padding: 10px 15px;
            margin-bottom: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .headline-text {
            font-size: 26px;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.1;
            letter-spacing: -1px;
            color: #fff;
        }

        /* Subtexto */
        .sub-description {
            font-size: 15px;
            color: #d1d1d1;
            margin-bottom: 35px;
            line-height: 1.4;
            max-width: 320px;
            font-weight: 400;
        }

        /* Botão Estilo "Entrar Agora" com animação */
        .cta-button {
            position: relative;
            background-color: var(--primary-red);
            color: #fff;
            text-decoration: none;
            width: 100%;
            max-width: 340px;
            padding: 20px 0;
            font-weight: 900;
            font-size: 22px;
            border-radius: 4px;
            text-transform: uppercase;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
            overflow: hidden;
            transition: transform 0.2s;
        }

        .cta-button:active {
            transform: scale(0.97);
        }

        /* Efeito de brilho que passa pelo botão */
        .cta-button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 20%;
            height: 200%;
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(30deg);
            transition: none;
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -60%; }
            20% { left: 120%; }
            100% { left: 120%; }
        }

        /* Prova Social e Rodapé */
        .footer-box {
            margin-top: 30px;
        }

        .social-text {
            font-size: 13px;
            color: #888;
            margin-bottom: 15px;
            display: block;
        }

        .copyright-text {
            font-size: 10px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Ajuste para telas pequenas */
        @media (max-height: 600px) {
            .headline-text { font-size: 20px; }
            .sub-description { font-size: 13px; margin-bottom: 20px; }
            .cta-button { padding: 15px 0; }
        }
    </style>
</head>
<body>

    <div class="background-layer"></div>
    <div class="vignette"></div>

    <div class="main-content">
        
        <div class="headline-wrapper">
            <h1 class="headline-text">
                ACESSO LIBERADO A MINHA<br>COMUNIDADE GRATUITO
            </h1>
        </div>

        <p class="sub-description">
            Entre agora na comunidade que mais entrega <b>Odds altas</b>, análises, organização e responsabilidades.
        </p>

        <a href="https://tpcmd.redirecionar.online" class="cta-button" id="pixel-trigger">
            ENTRAR AGORA
        </a>

        <div class="footer-box">
            <span class="social-text">🔥 Pessoas reais com resultados reais</span>
            <p class="copyright-text">Copyright © 2026 - Todos os direitos reservados</p>
        </div>

    </div>

    <script>
        document.getElementById('pixel-trigger').addEventListener('click', function(e) {
            var url = this.getAttribute('href');
            
            if(url === "https://tpcmd.redirecionar.online"") {
                alert("Opa! Você esqueceu de colocar o link do seu grupo no código.");
                e.preventDefault();
                return;
            }

            e.preventDefault();
            fbq('track', 'Contact');
            fbq('track', 'Subscribe');
            
            setTimeout(function(){
                window.location.href = url;
            }, 350);
        });
    </script>

</body>
</html>
